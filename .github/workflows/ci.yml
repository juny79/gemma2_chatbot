name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (CPU-only, no GPU needed for tests)
        run: |
          pip install --upgrade pip
          # llama-cpp-python CPU 빌드 (CI 환경에 GPU 없음)
          pip install llama-cpp-python==0.3.4 --no-cache-dir
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check inference/ tests/

      - name: Run tests
        env:
          GGUF_MODEL_PATH: "dummy_model.gguf"
          DB_PATH: ":memory:"
        run: |
          pytest tests/ -v --tb=short
